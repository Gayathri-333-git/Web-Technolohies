<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <Form action="" method="">
        <caption>Student Form</caption><br><br>
        <table>
        <label for="name">Name:</label>
        <input type="name" required id="name" placeholder="Ex:Gayathri"><br><br>
        <label for="phone number">Phone Number:</label>
        <input type="numbers" required id="phone number" placeholder="9876543210"><br><br>
        <label for="email">Email:</label>
        <input type="email" required id="email" placeholder="abc123@gmail.com"><br><br>
        <label for="password">Password:</label>
        <input type="password" required id="password"><br><br>
        <input type="submit">

        </table>
    </Form>
    
</body>
</html>
