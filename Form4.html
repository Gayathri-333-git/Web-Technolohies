<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>Phone Number Validation</h2>
    <form action="" method="">
        <label for="phone number">Phone Number</label>
        <input type="text" id="phone number" required pattern="[6-9]{1}[0-9]{9}"><br><br>
        <input type="submit">

    </form>
    
</body>
</html>
