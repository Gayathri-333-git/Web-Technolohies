<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h3>Radio button</h3>
    <form>
        <label for="gender">Select Gender</label><br>
        <input type="radio" required id="male">
        <label for="male">Male</label>
        <input type="radio" required id="female">
        <label for="female">Female</label>
        <input type="radio" required id="other">
        <label for="other">Others</label><br><br>
        <input type="submit">


    </form>
    
</body>
</html>
