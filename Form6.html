<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>Email Validation</h2>
    <form>
        <label for="email">Email</label>
        <input type="email" id="email" required pattern="[a-z0-9.]+@[a-z]+[a-z]{2,}"><br><br>
        <input type="submit">
    </form>
    
</body>
</html>
